{% extends 'base.html' %}
{% block title %}Wi-Fi Kiosk Access{% endblock %}
{% block content_login %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card card-widget widget-user-2 shadow-lg">
            <div class="widget-user-header bg-warning">
                <div class="widget-user-image">
                    <img class="img-circle elevation-2" src="/static/img/wifi-icon.png" alt="User Avatar">
                </div>
                <h3 class="widget-user-username">High-Speed Public Wi-Fi</h3>
                <h5 class="widget-user-desc">Insert Coin or Scan Face to Begin</h5>
            </div>
            <div class="card-footer p-0">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            1 Hour Access <span class="float-right badge bg-primary">₱ 5.00</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            24 Hours Access <span class="float-right badge bg-success">₱ 20.00</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center">
                <p class="lead">Step 1: Identify Yourself</p>
                <a href="/scan" class="btn btn-app bg-secondary">
                    <i class="fas fa-camera"></i> Scan Face
                </a>
                
                <hr>
                
                <p class="lead">Step 2: Add Credits</p>
                <button class="btn btn-outline-warning btn-lg m-1" onclick="simulateCoin(1)">
                    <i class="fas fa-coins"></i> ₱1
                </button>
                <button class="btn btn-outline-warning btn-lg m-1" onclick="simulateCoin(5)">
                    <i class="fas fa-coins"></i> ₱5
                </button>
                <button class="btn btn-outline-info btn-lg m-1">
                    <i class="fas fa-ticket-alt"></i> Voucher
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Simulate IoT Hardware interrupt
    function simulateCoin(amount) {
        // In real deployment, this would be a WebSocket listener waiting for the coin slot
        alert("IoT Signal Received: Inserted " + amount + " Pesos");
        // Logic: Add credit to the temporary 'Guest' session associated with the scanned face
    }
</script>
{% endblock %}
