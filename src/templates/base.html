<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentinel Framework{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/adminlte.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    /* Inline critical styles to ensure visual layout if external CSS fails */
    body{background:#f4f6fa;color:#343a40;font-family:Arial,Helvetica,sans-serif;margin:0}
    .content-wrapper{padding:1.5rem;min-height:60vh}
    .card{background:#fff;border:1px solid #e0e6ef;border-radius:.5rem}
    .card-header{padding:.75rem 1rem;background:#fff;border-bottom:1px solid #e9eef6}
    .card-body{padding:1rem}
    .btn{display:inline-block;padding:.5rem .75rem;border-radius:.375rem;text-decoration:none;color:#fff;background:#007bff;border:0}
    .btn-primary{background:#007bff}.btn-success{background:#28a745}
    .text-center{text-align:center}
    </style>
</head>
<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <!-- Main Header -->
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
                <li class="nav-item d-none d-sm-inline-block">
                    <a href="/" class="nav-link">Home</a>
                </li>
            </ul>
        </nav>
        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper" style="min-height: 100vh;">
            <section class="content pt-4">
                <div class="container-fluid">
                    {% block content %}{% endblock %}
                </div>
            </section>
        </div>
        <!-- Main Footer -->
        <footer class="main-footer text-center">
            <strong>Sentinel Framework &copy; 2026</strong>
        </footer>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/static/js/adminlte.min.js"></script>
</body>
</html>
