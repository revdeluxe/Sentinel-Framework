{% extends 'base.html' %}

{% block title %}Login | {{ system_name }}{% endblock %}

{% block content %}
<div class="card card-outline card-primary shadow-lg" id="loginCard">
    <div class="card-header text-center">
        <a href="/" class="h1"><b>{{ system_name }}</b></a>
        <p class="text-muted small mb-0">Identity Assurance Gateway</p>
    </div>
    <div class="card-body login-card-body">
        <p class="login-box-msg">Sign in to authenticate</p>

        <form method="post" id="loginForm">
            <div class="input-group mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
                <div class="input-group-append">
                    <div class="input-group-text"><span class="fas fa-user"></span></div>
                </div>
            </div>
            <div class="input-group mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
                <div class="input-group-append">
                    <div class="input-group-text"><span class="fas fa-lock"></span></div>
                </div>
            </div>

            <div id="adminFields" style="display:none; background: #f4f6f9; padding: 10px; margin-bottom: 10px;">
                <input type="password" name="admin_key" class="form-control form-control-sm" placeholder="Admin Key">
                <input type="hidden" name="admin_mode" id="admin_mode" value="0">
            </div>

            <div class="row">
                <div class="col-12">
                    <button type="submit" class="btn btn-primary btn-block">Authenticate</button>
                </div>
            </div>
        </form>
        
        <div class="text-center mt-3">
            <a href="/scan" class="text-secondary"><i class="fas fa-expand"></i> Use Biometric Scan</a>
        </div>
    </div>
</div>

<script>
document.addEventListener('keydown', function(e) {
    if (e.shiftKey && e.key === 'F2') {
        const adminSection = document.getElementById('adminFields');
        const hiddenInput = document.getElementById('admin_mode');
        if (adminSection.style.display === 'none') {
            adminSection.style.display = 'block';
            hiddenInput.value = '1';
        } else {
            adminSection.style.display = 'none';
            hiddenInput.value = '0';
        }
    }
});
</script>
{% endblock %}
