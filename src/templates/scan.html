{% extends 'base.html' %}
{% block title %}Scan - Sentinel Framework{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card card-success shadow">
            <div class="card-header text-center">
                <h3 class="card-title mb-0">Biometric Capture</h3>
            </div>
            <div class="card-body">
                <p class="lead text-center">Allow camera access and capture your face for authentication.</p>
                <form method="post">
                    <input type="hidden" name="image_data" id="image_data">
                    <div class="mb-3 text-center">
                        <video id="video" width="320" height="240" autoplay class="border rounded"></video>
                        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-2">
                            <button type="button" onclick="capture()" class="btn btn-outline-primary btn-block w-100"><i class="fas fa-camera"></i> Capture</button>
                        </div>
                        <div class="col-6 mb-2">
                            <button type="submit" class="btn btn-success btn-block w-100"><i class="fas fa-upload"></i> Submit</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
function capture() {
        var video = document.getElementById('video');
        var canvas = document.getElementById('canvas');
        var context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, 320, 240);
        var dataURL = canvas.toDataURL('image/png');
        document.getElementById('image_data').value = dataURL;
}

navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(stream) {
                document.getElementById('video').srcObject = stream;
        })
        .catch(function(err) {
                alert('Camera access denied: ' + err);
        });
</script>
{% endblock %}
